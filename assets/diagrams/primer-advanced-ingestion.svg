<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 460" width="1120" height="460" role="img" aria-label="Advanced ingestion is a swappable pipeline. Messy documents like PDFs and markdown go through four steps: Read opens the file; Chunk splits by meaning and keeps tables and headings; Enrich adds an AI summary plus page and element-type metadata; Write stores the vectors and metadata in the vector store.">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#512bd4"/><stop offset="1" stop-color="#d600aa"/>
    </linearGradient>
    <marker id="arrow" markerWidth="13" markerHeight="11" refX="11" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,5.5 L0,11 Z" fill="#d600aa"/>
    </marker>
  </defs>
  <rect width="1120" height="460" fill="#1b1b1f"/>
  <g font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">

    <text x="162" y="138" text-anchor="middle" fill="#8f8f99" font-size="13" font-weight="600">in: PDF, markdown</text>

    <rect x="70" y="150" width="185" height="170" rx="16" fill="#1d1d22" stroke="url(#grad)" stroke-width="2"/>
    <text x="162" y="206" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700">Read</text>
    <text x="162" y="246" text-anchor="middle" fill="#b4b4be" font-size="13" font-weight="600">open the file</text>

    <rect x="283" y="150" width="185" height="170" rx="16" fill="#1d1d22" stroke="url(#grad)" stroke-width="2"/>
    <text x="375" y="206" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700">Chunk</text>
    <text x="375" y="246" text-anchor="middle" fill="#b4b4be" font-size="13" font-weight="600">split by meaning,</text>
    <text x="375" y="268" text-anchor="middle" fill="#b4b4be" font-size="13" font-weight="600">keep tables + headings</text>

    <rect x="496" y="150" width="185" height="170" rx="16" fill="#1d1d22" stroke="url(#grad)" stroke-width="2"/>
    <text x="588" y="206" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700">Enrich</text>
    <text x="588" y="246" text-anchor="middle" fill="#b4b4be" font-size="13" font-weight="600">add an AI summary,</text>
    <text x="588" y="268" text-anchor="middle" fill="#b4b4be" font-size="13" font-weight="600">+ page, element type</text>

    <rect x="709" y="150" width="185" height="170" rx="16" fill="#1d1d22" stroke="url(#grad)" stroke-width="2"/>
    <text x="801" y="206" text-anchor="middle" fill="#ffffff" font-size="19" font-weight="700">Write</text>
    <text x="801" y="246" text-anchor="middle" fill="#b4b4be" font-size="13" font-weight="600">store vectors</text>
    <text x="801" y="268" text-anchor="middle" fill="#b4b4be" font-size="13" font-weight="600">+ metadata</text>

    <rect x="948" y="195" width="124" height="80" rx="14" fill="#241a3a" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="1010" y="240" text-anchor="middle" fill="#ffffff" font-size="15" font-weight="700">vector store</text>

    <line x1="255" y1="235" x2="281" y2="235" stroke="#d600aa" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="468" y1="235" x2="494" y2="235" stroke="#d600aa" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="681" y1="235" x2="707" y2="235" stroke="#d600aa" stroke-width="3" marker-end="url(#arrow)"/>
    <line x1="894" y1="235" x2="946" y2="235" stroke="#d600aa" stroke-width="3" marker-end="url(#arrow)"/>

    <text x="560" y="416" text-anchor="middle" fill="#e7e7ee" font-size="16" font-weight="700">Advanced ingestion is a swappable pipeline: split by meaning, keep the structure, enrich each chunk.</text>
  </g>
</svg>
