<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 460" width="1120" height="460" role="img" aria-label="An MCP server (Microsoft Learn) exposes its tools once, and any client (your app, another app, any MCP client) can use them.">
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#512bd4"/><stop offset="1" stop-color="#d600aa"/>
    </linearGradient>
    <marker id="arrow" markerWidth="13" markerHeight="11" refX="11" refY="5.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L12,5.5 L0,11 Z" fill="#d600aa"/>
    </marker>
  </defs>
  <rect width="1120" height="460" fill="#1b1b1f"/>
  <g font-family="'Segoe UI', system-ui, -apple-system, Roboto, sans-serif">
    <rect x="80" y="120" width="360" height="230" rx="16" fill="#1d1d22" stroke="url(#grad)" stroke-width="2"/>
    <text x="108" y="164" fill="#ffffff" font-size="20" font-weight="700">MCP server</text>
    <text x="108" y="190" fill="#a78bfa" font-size="14" font-weight="700">Microsoft Learn</text>
    <rect x="108" y="210" width="304" height="40" rx="9" fill="#232328" stroke="#3a3a42"/>
    <text x="126" y="235" fill="#b4b4be" font-size="13" font-weight="600" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace">microsoft_docs_search</text>
    <rect x="108" y="258" width="304" height="40" rx="9" fill="#232328" stroke="#3a3a42"/>
    <text x="126" y="283" fill="#b4b4be" font-size="13" font-weight="600" font-family="ui-monospace, 'Cascadia Code', Consolas, monospace">microsoft_docs_fetch</text>
    <text x="108" y="328" fill="#8f8f99" font-size="13" font-weight="600">exposes its tools once</text>

    <rect x="760" y="130" width="280" height="60" rx="12" fill="#232328" stroke="#3a3a42"/>
    <text x="900" y="166" text-anchor="middle" fill="#e7e7ee" font-size="15" font-weight="700">your app</text>
    <rect x="760" y="205" width="280" height="60" rx="12" fill="#232328" stroke="#3a3a42"/>
    <text x="900" y="241" text-anchor="middle" fill="#e7e7ee" font-size="15" font-weight="700">another app</text>
    <rect x="760" y="280" width="280" height="60" rx="12" fill="#232328" stroke="#3a3a42"/>
    <text x="900" y="316" text-anchor="middle" fill="#e7e7ee" font-size="15" font-weight="700">any MCP client</text>

    <line x1="440" y1="235" x2="758" y2="162" stroke="url(#grad)" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="440" y1="235" x2="758" y2="235" stroke="url(#grad)" stroke-width="2.5" marker-end="url(#arrow)"/>
    <line x1="440" y1="235" x2="758" y2="308" stroke="url(#grad)" stroke-width="2.5" marker-end="url(#arrow)"/>

    <text x="560" y="416" text-anchor="middle" fill="#e7e7ee" font-size="16" font-weight="700">One open standard. A server exposes its tools once; any client uses them. HTTP, but for tools.</text>
  </g>
</svg>
